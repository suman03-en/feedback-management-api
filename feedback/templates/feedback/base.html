{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Feedback management dashboard for tracking requests, responses, and resolution status."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{% static 'feedback/styles.css' %}" />
    <title>{% block title %}Feedback Hub{% endblock title %}</title>
  </head>
  <body>
    <div class="page-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Feedback management system</p>
          <h1>Feedback Hub</h1>
        </div>
        <a class="button button-primary" href="{% url 'feedback_create' %}"
          >New feedback</a
        >
      </header>

      <main class="content-grid">
        {% block content %}{% endblock content %}
      </main>
    </div>
  </body>
</html>
