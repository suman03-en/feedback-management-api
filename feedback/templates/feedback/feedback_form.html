{% extends "feedback/base.html" %} {% block title %}Submit Feedback{% endblock title %} {% block content %}
<section class="card form-card">
  <div class="form-header">
    <div>
      <p class="eyebrow">Create item</p>
      <h2 class="section-title">Submit feedback</h2>
      <p class="section-subtitle">
        Capture the request clearly so it can be triaged and assigned without
        extra back-and-forth.
      </p>
    </div>
  </div>

  <form method="post">
    {% csrf_token %} {{ form.as_p }}
    <button class="button button-primary" type="submit">Submit feedback</button>
  </form>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const anonymousField = document.getElementById("id_is_anonymous");
      const nameField = document.getElementById("id_name");
      const emailField = document.getElementById("id_email");
      const nameFieldRow = nameField ? nameField.closest("p") : null;
      const emailFieldRow = emailField ? emailField.closest("p") : null;

      if (!anonymousField || !nameField || !emailField) return;

      function toggleIdentityFields() {
        const isAnonymous = anonymousField.checked;

        nameField.disabled = isAnonymous;
        emailField.disabled = isAnonymous;
        nameField.classList.toggle("is-disabled-ui", isAnonymous);
        emailField.classList.toggle("is-disabled-ui", isAnonymous);

        if (nameFieldRow)
          nameFieldRow.classList.toggle("is-disabled-field", isAnonymous);
        if (emailFieldRow)
          emailFieldRow.classList.toggle("is-disabled-field", isAnonymous);

        if (isAnonymous) {
          nameField.dataset.wasRequired = nameField.required ? "true" : "false";
          emailField.dataset.wasRequired = emailField.required
            ? "true"
            : "false";

          nameField.required = false;
          emailField.required = false;

          nameField.value = "";
          emailField.value = "";
        } else {
          if (nameField.dataset.wasRequired === "true")
            nameField.required = true;
          if (emailField.dataset.wasRequired === "true")
            emailField.required = true;
        }
      }

      anonymousField.addEventListener("change", toggleIdentityFields);
      toggleIdentityFields();
    });
  </script>
</section>
{% endblock content %}
